<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Tournament Rules</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* === RESTRICTIONS & BASE STYLES === */
        :root {
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --header-bg: #000000;
            --timeline-base: #d1d5db;
            --card-grey: #e5e7eb; 
        }
        
        body, html {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            width: 100%; 
            overflow-x: hidden; 
            overflow-y: auto; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #landscape-blocker {
            display: none;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; color: #fff; z-index: 99999;
            align-items: center; justify-content: center;
            text-align: center; font-size: 1.5rem; font-weight: bold; padding: 20px;
        }
        @media screen and (orientation: landscape) {
            #landscape-blocker { display: flex; }
            #app-content { display: none; }
        }

        /* === HEADER === */
        .header {
            background-color: var(--header-bg);
            height: 60px;
            display: flex; justify-content: center; align-items: center;
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .header a { height: 100%; display: block; }
        .header img { height: 100%; width: auto; object-fit: contain; }

        /* === MAIN SCROLLABLE LAYOUT === */
        .content-wrapper {
            margin-top: 60px; 
            width: 100%; 
            display: flex; flex-direction: column;
            min-height: calc(100vh - 60px);
        }

        /* === COMMAND MODULE (Top Section - Solid Black) === */
        .command-module {
            background-color: #000000; 
            border-bottom: 4px solid #333333; 
            padding: 30px 15px;
            text-align: center;
            position: relative; z-index: 20;
        }
        .command-module h1 {
            font-size: 1.6rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.5px; margin: 0; line-height: 1.2;
            color: #ffffff;
        }
        .command-module h2 {
            font-size: 0.85rem; font-weight: 800; color: #aaaaaa; 
            margin: 5px 0 20px 0; text-transform: uppercase; letter-spacing: 2px;
        }
        
        .ph-box {
            background: #ffffff; 
            color: #000000; 
            padding: 12px 20px; border-radius: 4px;
            box-shadow: 6px 6px 0px #333333; 
            display: inline-block;
        }
        .ph-box h3 {
            font-size: 1.1rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; margin: 0;
            transition: opacity 0.3s ease;
        }

        /* === ARENA (Bottom Section - Image Background) === */
        .arena {
            position: relative; width: 100%;
            flex-grow: 1; 
            background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2.ff.garena.all/202510/704e9a06ea98cbb26cedc03b8ce96375.jpg');
            background-size: cover;
            background-position: center top;
            padding: 30px 0 80px 0; 
            z-index: 10;
        }

        /* === DYNAMIC HORIZONTAL TIMELINE === */
        .timeline-wrapper {
            width: 90%;
            margin: 0 auto 40px auto; 
            position: relative;
            z-index: 50;
        }
        .timeline {
            position: relative;
            display: flex; 
            flex-direction: row; 
            justify-content: space-between; 
            align-items: center;
            width: 100%;
        }
        .timeline-line {
            position: absolute; top: 50%; left: 0; right: 0;
            transform: translateY(-50%); height: 4px; width: 100%;
            background-color: var(--timeline-base); z-index: 1; border-radius: 2px;
        }
        .timeline-progress {
            position: absolute; top: 0; left: 0; height: 100%;
            background-color: #000; width: 0%; 
            transition: width 0.6s cubic-bezier(0.25, 1, 0.2, 1); border-radius: 2px;
        }
        .point {
            width: 28px; height: 28px; background-color: #fff; color: #000;
            border: 3px solid var(--timeline-base); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; font-weight: 900; z-index: 2; cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .point.selected {
            background-color: #000; color: #fff; border-color: #000; transform: scale(1.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* === CARD & CHARACTER CONTAINER === */
        .card-container {
            position: relative;
            width: 82%;
            margin-left: 3%;
        }

        .rule-card {
            width: 100%; 
            background-color: var(--card-grey);
            border: 3px solid #000;
            box-shadow: 8px 8px 0px #000000; 
            border-radius: 6px;
            padding: 20px 105px 20px 15px; 
            position: relative;
            overflow: hidden; 
            min-height: 250px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .rule-load-bar {
            position: absolute; top: 0; left: 0;
            width: 0%; height: 4px; background-color: #000000;
            transition: width 0.25s linear;
        }

        #active-rule-text {
            font-size: 0.95rem; font-weight: 700; line-height: 1.4; color: #000; 
            margin: 0;
        }
        #active-rule-text ul { padding-left: 18px; margin: 8px 0; }
        #active-rule-text li { margin-bottom: 8px; }
        #active-rule-text strong { font-weight: 900; }

        #active-rule-text table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
            background: #fff; border: 2px solid #000; font-size: 0.85rem;
        }
        #active-rule-text th, #active-rule-text td {
            border: 1px solid #000; padding: 4px 8px; text-align: left;
            font-weight: 800;
        }
        #active-rule-text th {
            background: #000; color: #fff; text-transform: uppercase;
        }

        .character {
            position: absolute;
            left: 100%; 
            transform: translateX(-100%);
            bottom: -3px; 
            height: 240px; 
            object-fit: contain; transform-origin: bottom right;
            z-index: 15;
            pointer-events: none;
            filter: drop-shadow(-4px 4px 6px rgba(0,0,0,0.4));
        }

        .disq-block {
            margin-top: 15px; padding: 10px;
            background: #ffcccc; 
            border-left: 4px solid #dc2626;
            font-weight: 800; font-size: 0.85rem; color: #000;
        }
        .disq-title {
            text-transform: uppercase; display: block; margin-bottom: 3px;
            color: #dc2626; font-weight: 900;
        }

        .typing-cursor {
            display: inline-block; width: 8px; height: 1em;
            background-color: #000; vertical-align: text-bottom; margin-left: 3px;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div id="landscape-blocker">
        <span>Portrait Mode Only.<br>Please rotate your device.</span>
    </div>

    <!-- Fixed Header -->
    <header class="header">
        <a href="index.html">
            <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-03-30_08-28-40-573.png?updatedAt=1774839553114" alt="Main Logo" draggable="false">
        </a>
    </header>

    <main class="content-wrapper">
        <!-- COMMAND MODULE -->
        <div class="command-module">
            <h1>Mega Tournament Rule</h1>
            <h2>E-sport Protection</h2>
            
            <div id="point-header-box" class="ph-box">
                <h3 id="point-header">On Going Mega Tournament</h3>
            </div>
        </div>

        <!-- ARENA -->
        <div class="arena">

            <!-- HORIZONTAL TIMELINE -->
            <div class="timeline-wrapper">
                <div class="timeline">
                    <div class="timeline-line">
                        <div class="timeline-progress" id="timeline-progress"></div>
                    </div>
                    <!-- Added Star Point here -->
                    <div class="point selected" id="pt-star" onclick="showRule('star')">⭐</div>
                    <div class="point" id="pt-1" onclick="showRule(1)">1</div>
                    <div class="point" id="pt-2" onclick="showRule(2)">2</div>
                    <div class="point" id="pt-3" onclick="showRule(3)">3</div>
                    <div class="point" id="pt-4" onclick="showRule(4)">4</div>
                    <div class="point" id="pt-5" onclick="showRule(5)">5</div>
                    <div class="point" id="pt-6" onclick="showRule(6)">6</div>
                    <div class="point" id="pt-7" onclick="showRule(7)">7</div>
                </div>
            </div>

            <!-- Card & Character Relative Wrapper -->
            <div class="card-container">
                <img id="character" class="character" src="https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/181faa683450fa82e5b7ffe068a9c7f9.png" alt="Character" draggable="false">

                <!-- Grey Rule Card -->
                <div id="rule-card" class="rule-card">
                    <div id="rule-load-bar" class="rule-load-bar"></div>
                    <div id="active-rule-text"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        /* === RESTRICTIONS ENFORCEMENT === */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(event) {
            if (event.key === 'F12' || event.keyCode === 123) event.preventDefault();
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.key === 'I' || event.key === 'i')) event.preventDefault();
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.key === 'J' || event.key === 'j')) event.preventDefault();
            if ((event.ctrlKey || event.metaKey) && (event.key === 'U' || event.key === 'u')) event.preventDefault();
        });

        /* === RULES DATA === */
        const rulesData = {
            'star': {
                header: "On Going Mega Tournament",
                text: `<div style="font-size: 0.9rem; line-height: 1.5; color: #1f2937;">
                         <p style="color: #b91c1c; font-weight: 900; font-size: 1.05rem; margin-bottom: 5px;">📢 MEGA TOURNAMENT OFFICIAL NOTICE 📢</p>
                         <p style="margin-bottom: 12px; font-weight: 700;">Dragon Tournaments presents the biggest Free Fire challenge! Agar aapki squad mein dum hai, toh register karein aur jeetein <span style="color: #047857; text-decoration: underline;">S24 for the whole team!</span></p>

                         <span style="display: inline-block; background: #312e81; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; margin-top: 5px;">🏆 TOURNAMENT STRUCTURE & RULES</span>
                         <ul style="margin-top: 5px; list-style-type: square;">
                             <li>Is tournament mein total <strong>3 Rounds</strong> honge. Jo 3 Round win karegi wahi ek perfect E-sport team hogi.</li>
                             <li><strong style="color: #b91c1c;">Round 1 & 2 (Elimination):</strong> Aapko dono rounds win karne honge. Jeetne ke liye Booyah mandatory nahi hai; yeh <strong style="color: #c026d3;">Point System (Details on Point 5 📍)</strong> par base hoga.</li>
                             <li><strong style="color: #047857;">Skill Matters:</strong> Camp karke khelne ka koi fayda nahi. Kills aur aggressive gameplay se hi points milenge.</li>
                             <li><strong style="color: #d97706;">Schedule:</strong> R1 aur R2 ki date & timing IGL ko WhatsApp par milegi.</li>
                             <li><strong style="color: #b91c1c;">Round 3 (Finale) - 20 May:</strong> Sirf Top 4 Teams Finale khelenge Kalahari (Big Map) par.</li>
                         </ul>

                         <span style="display: inline-block; background: #831843; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; margin-top: 15px;">📝 REGISTRATION PROCESS (FREE)</span>
                         <ul style="margin-top: 5px; list-style-type: square;">
                             <li><strong style="color: #b91c1c;">Deadline:</strong> April ke end tak.</li>
                             <li><strong>Steps:</strong> Squad ke 4 players ko hamari "Announcement" reel apni Insta Story par lagani hogi. Likhna hai: <em>"Free Tournament hai, Prize pool S24 puri team ko"</em> aur hamare handle ko MENTION karna hai.</li>
                             <li><span style="background: #fef08a; padding: 2px 4px; color: #854d0e; font-weight: 900;">Note:</span> Story upload karne ke <strong style="color: #b91c1c; text-decoration: underline;">6 ghante baad hi</strong> aap slot ke liye message kar sakte hain.</li>
                             <li><strong>Message Here:</strong> Chat Telegram par hogi. DM karein 👉 <a href="https://t.me/Dragontournament_xyz" target="_blank" style="color: #2563eb; font-weight: 900; text-decoration: underline;">@Dragontournament_xyz</a></li>
                         </ul>

                         <div style="background: #e2e8f0; padding: 8px; border-left: 4px solid #312e81; font-size: 0.8rem; margin-bottom: 10px;">
                             <strong>Required Details (Agar 6hr target pura ho gaya):</strong> Exact Game Name, Game UID, Player Role, Insta ID, aur IGL WhatsApp Number.
                         </div>

                         <span style="display: inline-block; background: #064e3b; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; margin-top: 10px;">🎁 WINNER PRIZE & DELIVERY</span>
                         <ul style="margin-top: 5px; list-style-type: square;">
                             <li><strong>Direct Amazon Delivery:</strong> Hum aapke address par Amazon se direct order karenge.</li>
                             <li><strong>Home Visit:</strong> Agar aap hamari winner announcement video mein face show karne ko ready hain, toh hum khud aakar prize denge!</li>
                         </ul>
                         <p style="text-align: center; color: #b91c1c; font-weight: 900; margin-top: 10px; font-style: italic;">Dragon Tournaments - Play with Skills, Win with Pride!</p>
                       </div>`
            },
            1: {
                header: "Introduction",
                text: `<ul>
                         <li><strong>Tournament Structure:</strong> Yeh tournament 2 ya 3 rounds mein conduct kiya jayega, jo ek <strong>Pyramid Structure</strong> (Qualifiers to Finals) follow karega.</li>
                         <li><strong>Fixed Slots:</strong> Har team ko isme fixed slots diye jayenge.</li>
                         <li><strong>Punctuality:</strong> Match exact time par start hoga. Time se pehle start nahi kiya jayega, aur time khatam hone ke baad join karne ka koi moka nahi milega.</li>
                       </ul>`
            },
            2: {
                header: "Team Composition",
                text: `<ul>
                         <li>Har team mein exactly 4 players hone chahiye (1 substitute optional).</li>
                         <li>Match start karne ke liye kam se kam 3 registered players ka lobby mein aana zaroori hai.</li>
                         <li>Ek player team ka <strong>Captain (IGL)</strong> hona chahiye jo officials ya admins se communication handle karega.</li>
                       </ul>`
            },
            3: {
                header: "Devices & Accounts",
                text: `<ul>
                         <li><strong>Sirf Mobile Allowed:</strong> Esports matches strictly smartphones par khele jaate hain. Emulators/PCs/Tablets ka use disqualification laata hai.</li>
                         <li><strong>No Triggers:</strong> External hardware ya triggers mana hai.</li>
                         <li>Account sharing allowed nahi hai. Har player sirf apne registered UID se khelega.</li>
                       </ul>`
            },
            4: {
                header: "Match Rules & Format",
                text: `<ul>
                         <li>Matches Custom Rooms mein khele jaate hain. ID/Password 10-15 min pehle diya jata hai.</li>
                         <li><strong>Time Value:</strong> Agar team time par join nahi karti, toh bina unke match start ho jayega.</li>
                         <li>Maps randomly select hote hain (Bermuda, Purgatory, Kalahari, Alpine).</li>
                         <li>Network connection player ki zimmedari hai. Net jane par restart nahi hoga.</li>
                       </ul>`
            },
            5: {
                header: "Official Scoring System",
                text: `Placement aur Kills milakar standings banti hain. <strong>Har Kill = 1 Point</strong>.
                       <table>
                           <tr><th>Placement</th><th>Points</th></tr>
                           <tr><td>1st (Booyah)</td><td>12</td></tr>
                           <tr><td>2nd</td><td>9</td></tr>
                           <tr><td>3rd</td><td>8</td></tr>
                           <tr><td>4th</td><td>7</td></tr>
                           <tr><td>5th - 6th</td><td>6 - 5</td></tr>
                           <tr><td>7th - 8th</td><td>4 - 3</td></tr>
                           <tr><td>9th - 10th</td><td>2 - 1</td></tr>
                           <tr><td>11th - 12th</td><td>0</td></tr>
                       </table>`
            },
            6: {
                header: "Fair Play Rules",
                text: `<ul>
                         <li><strong>Bug Abuse:</strong> Game ke in-game glitch ka fayda uthana allowed nahi hai.</li>
                         <li><strong>Teaming/Ghosting:</strong> Dusri teams ke sath milkar khelna ya stream sniping strictly prohibited hai.</li>
                       </ul>
                       <div class="disq-block">
                           <span class="disq-title">DISQUALIFICATION:</span>
                           Kisi bhi tarah ka Hack, Script, Skin Mod, ya 3rd-party app use karna <strong>PERMANENT BAN</strong> laata hai.
                       </div>`
            },
            7: {
                header: "Player Conduct",
                text: `<ul>
                         <li>Kisi bhi tarah ka toxic behavior, gaali-galoch, ya discrimination bilkul bardasht nahi kiya jata.</li>
                         <li>Team ka naam aur players ke IGNs clean hone chahiye, usme koi bhi offensive ya abusive word nahi hona chahiye.</li>
                       </ul>`
            }
        };

        /* === INTERACTION LOGIC === */
        let typingTimeout = null;
        
        const pointHeader = document.getElementById('point-header');
        const ruleTextDisplay = document.getElementById('active-rule-text');
        const timelineProgress = document.getElementById('timeline-progress');
        const ruleLoadBar = document.getElementById('rule-load-bar');
        
        // Ordered array to handle 'star' and numbers easily for timeline
        const pointKeys = ['star', 1, 2, 3, 4, 5, 6, 7];

        function typeWriterHTML(element, htmlString, speed) {
            clearTimeout(typingTimeout);
            element.innerHTML = "";
            let i = 0;
            let currentHTML = "";

            function type() {
                if (i < htmlString.length) {
                    if (htmlString[i] === '<') {
                        let tag = "";
                        while (htmlString[i] !== '>' && i < htmlString.length) {
                            tag += htmlString[i]; i++;
                        }
                        tag += '>';
                        currentHTML += tag;
                        element.innerHTML = currentHTML + '<span class="typing-cursor"></span>';
                        i++; type(); 
                    } else {
                        currentHTML += htmlString[i];
                        element.innerHTML = currentHTML + '<span class="typing-cursor"></span>';
                        i++;
                        typingTimeout = setTimeout(type, speed);
                    }
                } else {
                    element.innerHTML = currentHTML; 
                }
            }
            type();
        }

        function showRule(pointId) {
            const index = pointKeys.indexOf(pointId);
            
            document.querySelectorAll('.point').forEach((pt, idx) => {
                pt.classList.remove('selected');
                if (idx <= index) pt.classList.add('selected');
            });
            
            const progressPercentage = (index / (pointKeys.length - 1)) * 100;
            timelineProgress.style.width = progressPercentage + '%';

            pointHeader.style.opacity = '0';
            setTimeout(() => {
                pointHeader.innerHTML = rulesData[pointId].header;
                pointHeader.style.opacity = '1';
            }, 200);

            clearTimeout(typingTimeout);
            ruleLoadBar.style.width = '0%'; 
            ruleTextDisplay.innerHTML = ""; 
            
            setTimeout(() => {
                ruleLoadBar.style.width = '100%';
                setTimeout(() => {
                    // Type speed remains 10 for normal points, but slightly faster (5) for the massive Star point
                    const speed = pointId === 'star' ? 5 : 10; 
                    typeWriterHTML(ruleTextDisplay, rulesData[pointId].text, speed);
                }, 250);
            }, 50); 
        }

        window.onload = () => {
            setTimeout(() => {
                ruleLoadBar.style.width = '100%';
                setTimeout(() => {
                    typeWriterHTML(ruleTextDisplay, rulesData['star'].text, 5);
                }, 250);
            }, 50);
        };
    </script>
</body>
</html>
