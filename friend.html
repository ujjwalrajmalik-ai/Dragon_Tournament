<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- STRICLY UNZOOMABLE VIEWPORT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Tournaments | Hall of Fame</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base & Resets + Security CSS */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* Prevents long press callout */
            -webkit-user-select: none; -khtml-user-select: none;
            -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* Prevent image dragging and hold menus globally */
        img {
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }

        input {
            -webkit-user-select: text; -khtml-user-select: text;
            -moz-user-select: text; -ms-user-select: text; user-select: text;
        }

        body {
            background-color: #000000; color: #ffffff;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; overflow-x: hidden;
            padding-top: 105px; /* Increased to account for taller header */
            padding-bottom: 50px;
        }

        /* Global Fixed App Header - WITH STATUS BAR SPACING */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; 
            height: 105px; /* 70px base + 35px for status bar */
            padding: 35px 20px 0 20px; /* Pushes content down below status bar */
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex;
            justify-content: space-between; align-items: center; 
            z-index: 900; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.8);
        }

        .header-title-img { height: 40px; width: auto; border-radius: 5px; cursor: pointer; }

        .header-action-btn {
            color: #fff; font-size: 22px; cursor: pointer; transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); display: flex;
            align-items: center; gap: 8px; background: none; border: none; outline: none;
        }
        
        .header-action-btn:hover { color: #00ffff; text-shadow: 0 0 15px #00ffff; transform: scale(1.1); }
        .header-action-text { font-size: 14px; font-weight: bold; text-transform: uppercase; display: none; }
        @media(min-width: 400px) { .header-action-text { display: block; } }

        /* Home View Container */
        #home-view { width: 100%; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; }

        .main-logo {
            width: 120px; height: auto; margin-top: 20px; margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2)); animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* Skeleton Loader Styles */
        #skeleton-container {
            width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 15px;
        }
        .skeleton-card {
            display: flex; align-items: center; background: rgba(25, 25, 25, 0.6);
            border-radius: 10px; padding: 15px; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .skeleton-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-20deg); animation: shimmer 1.5s infinite;
        }
        .skeleton-photo {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1); margin-right: 15px; flex-shrink: 0;
        }
        .skeleton-info { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .skeleton-line { height: 14px; background: rgba(255,255,255,0.1); border-radius: 4px; }
        .skeleton-line.w-70 { width: 70%; }
        .skeleton-line.w-40 { width: 40%; }
        .skeleton-badges { display: flex; gap: 10px; margin-top: 5px; }
        .skeleton-badge { width: 60px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 5px; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 200%; } }

        /* Search View Container */
        #search-view {
            display: none; width: 100%; min-height: calc(100vh - 105px);
            background-color: #000000; flex-direction: column; align-items: center;
            padding-top: 30px; animation: fadeIn 0.3s ease;
        }

        .search-input-wrapper { width: 90%; max-width: 500px; position: relative; margin-bottom: 30px; }
        .live-search-bar {
            width: 100%; padding: 18px 25px 18px 50px; font-size: 18px; color: #fff;
            background: rgba(25, 25, 25, 0.9); border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px; outline: none; box-shadow: 0 0 20px rgba(0, 255, 255, 0.1) inset, 0 0 15px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .live-search-bar:focus { border-color: #00ffff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3) inset, 0 0 20px rgba(0, 255, 255, 0.4); }
        .search-icon-inside { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #00ffff; font-size: 18px; }
        .search-status { color: #aaaaaa; font-size: 14px; margin-bottom: 20px; height: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Error Messages */
        .error { color: #ff3333 !important; text-shadow: 0 0 10px #ff3333 !important; text-align: center; font-weight: bold; margin-bottom: 20px;}

        /* Section Containers */
        .section-container { width: 90%; max-width: 600px; margin-bottom: 40px; display: flex; flex-direction: column; gap: 15px; }
        .section-title {
            font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 5px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); text-align: center;
        }

        /* Filter Dropdown */
        .filter-container { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 5px; }
        .sort-select {
            background: rgba(15, 15, 15, 0.8); color: #fff; border: 1px solid rgba(0, 255, 255, 0.3); padding: 6px 15px;
            border-radius: 20px; outline: none; font-size: 13px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); backdrop-filter: blur(5px);
        }
        .sort-select:focus { border-color: #00ffff; }
        .sort-select option { background: #111; color: #fff; }

        /* Short Summary Card Base */
        .player-card {
            display: flex; align-items: center; background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(10px);
            padding: 15px; cursor: pointer; position: relative; text-decoration: none; color: #fff; transition: all 0.3s ease;
        }
        .player-card-photo-wrapper {
            position: relative; width: 70px; height: 70px; margin-right: 15px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center; border-radius: 50%;
        }
        .player-card-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 2; }
        
        .player-card-info { display: flex; flex-direction: column; flex-grow: 1; justify-content: center; }
        .player-card-name { font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .player-card-uid { font-size: 12px; color: #00ffff; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }

        .badge-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
        .win-badge, .kill-badge { background: rgba(255, 255, 255, 0.1); padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .kill-badge { border: 1px solid rgba(255, 0, 0, 0.3); color: #ff6666; }

        /* Mini Profile Tier Icon on the far right (HOME PAGE - NO BOX) */
        .mini-tier-icon { margin-left: auto; font-size: 24px; padding-left: 10px; display: flex; align-items: center; justify-content: center; }

        /* --- TIER STRUCTURAL DESIGNS (Cards) --- */
        .tier-bronze { border: 1px solid #cd7f32; border-radius: 8px; }
        .tier-bronze .mini-tier-icon { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }
        
        .tier-silver {
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.1) 0%, rgba(30, 30, 30, 0.8) 50%, rgba(192, 192, 192, 0.1) 100%);
            border-left: 2px solid #c0c0c0; border-bottom: 2px solid #c0c0c0;
        }
        .tier-silver .mini-tier-icon { color: #c0c0c0; text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); }
        
        .tier-gold { border-radius: 10px; border: 1px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); transform-style: preserve-3d; perspective: 1000px; }
        .tier-gold .player-card-name { color: #ffd700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .tier-gold .player-card-photo-wrapper::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed #ffd700; border-radius: 50%; animation: spin-gold 4s linear infinite; z-index: 1;
        }
        .tier-gold .mini-tier-icon { color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
        @keyframes spin-gold { 100% { transform: rotate(360deg); } }

        .tier-diamond {
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            background: linear-gradient(45deg, rgba(15,15,15,0.9), rgba(0,255,255,0.1), rgba(15,15,15,0.9)); background-size: 200% 200%; animation: holo-bg 3s ease infinite;
            border-top: 2px solid #00ffff; border-right: 2px solid #00ffff; box-shadow: 0 0 20px #00ffff inset; overflow: hidden;
        }
        .tier-diamond .player-card-name { color: #00ffff; text-shadow: 0 0 10px #00ffff; letter-spacing: 2px; }
        .tier-diamond .mini-tier-icon { color: #00ffff; text-shadow: 0 0 20px #00ffff; animation: text-pulse-glow 2s infinite alternate; }
        .tier-diamond::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #00ffff 1px, transparent 1px); background-size: 20px 20px; opacity: 0.3; animation: particle-move 10s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes holo-bg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes particle-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        @keyframes text-pulse-glow { 0% { text-shadow: 0 0 10px #00ffff; } 100% { text-shadow: 0 0 30px #00ffff, 0 0 10px #00ffff; } }

        /* Full Profile Modal */
        #profile-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background-color: #000; background-size: cover; background-position: center;
            background-attachment: fixed; overflow-y: auto; padding-top: 105px;
        }

        /* Matches App Header */
        .modal-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 105px; padding: 35px 20px 0 20px;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; z-index: 1001; box-shadow: 0 2px 15px rgba(0, 0, 0, 0.8);
        }

        .modal-overlay { position: relative; width: 100%; min-height: calc(100% - 105px); background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; padding: 40px 20px 40px 20px; }
        .modal-content { width: 100%; max-width: 600px; padding: 30px; display: flex; flex-direction: column; align-items: center; position: relative; background: rgba(15, 15, 15, 0.5); backdrop-filter: blur(10px); }

        .modal-tier-box {
            position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; z-index: 10;
            transition: all 0.3s ease; text-align: center; min-width: 80px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .modal-photo-wrapper { width: 150px; height: 150px; margin-bottom: 20px; position: relative; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .modal-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 2; }

        .tier-bronze.modal-content .modal-photo-wrapper::before { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border: 4px solid #cd7f32; border-radius: 50%; box-shadow: 0 0 15px rgba(205, 127, 50, 0.5); z-index: 1; }
        .tier-silver.modal-content .modal-photo-wrapper::before { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border: 6px double #c0c0c0; border-radius: 50%; box-shadow: 0 0 15px rgba(192, 192, 192, 0.6); z-index: 1; }
        .tier-gold.modal-content .modal-photo-wrapper::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 4px dashed #ffd700; border-radius: 50%; animation: spin-gold 6s linear infinite; z-index: 1; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .tier-diamond.modal-content .modal-photo-wrapper::before { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border: 4px solid #00ffff; border-radius: 50%; box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff; z-index: 1; animation: pulse-glow 2s infinite alternate; }

        .tier-icon-badge {
            position: absolute; bottom: 0; right: 0; background: rgba(15, 15, 15, 0.9); border-radius: 50%; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .name-copy-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .modal-name { font-size: 32px; font-weight: 900; text-transform: uppercase; text-align: center; }
        
        .uid-copy-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; margin-bottom: 15px; color: #aaaaaa; font-size: 14px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .copy-btn { cursor: pointer; transition: color 0.3s; font-size: 16px; }

        .modal-talent { background: linear-gradient(90deg, #ff0055, #ff0000); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); margin-bottom: 15px; }
        
        .detail-badges-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .detail-win-badge { background: rgba(255, 255, 255, 0.1); padding: 6px 15px; border-radius: 5px; font-size: 16px; font-weight: bold; }
        .detail-kill-badge { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.4); color: #ff6666; padding: 6px 15px; border-radius: 5px; font-size: 16px; font-weight: bold; }

        .modal-huge-reel-btn {
            width: 90%; max-width: 350px; display: flex; justify-content: center; align-items: center; gap: 10px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); background-size: 300% 300%;
            padding: 15px; border-radius: 30px; color: white; font-size: 16px; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(220, 39, 67, 0.6); cursor: pointer; margin-bottom: 25px; animation: gradientShift 4s ease infinite; transition: transform 0.2s;
        }
        .modal-huge-reel-btn:hover { transform: scale(1.05); }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .modal-bio { text-align: center; font-size: 15px; color: #dddddd; margin-bottom: 25px; line-height: 1.6; }

        .social-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .social-icon { color: #ffffff; font-size: 28px; cursor: pointer; transition: transform 0.3s, color 0.3s; }
        .social-icon:hover { transform: translateY(-5px) scale(1.1); }
        .social-icon.insta:hover { color: #e1306c; text-shadow: 0 0 10px #e1306c; }
        .social-icon.yt:hover { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        .social-icon.mail:hover { color: #ea4335; text-shadow: 0 0 10px #ea4335; }

        .gallery-container { width: 100%; column-count: 2; column-gap: 15px; }
        .gallery-img { width: 100%; margin-bottom: 15px; border-radius: 10px; break-inside: avoid; cursor: pointer; transition: transform 0.2s; }
        .gallery-img:hover { transform: scale(1.02); }
        @media (max-width: 500px) { .gallery-container { column-count: 1; } }

        #lightbox-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        #lightbox-img { max-width: 95%; max-height: 95%; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        #elite-intro-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); z-index: 1500;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .elite-medal-icon {
            font-size: 100px; color: #ffd700; filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
            animation: cinematicIntro 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .elite-intro-text {
            color: #ffd700; font-size: 24px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 5px; margin-top: 20px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            opacity: 0; animation: textFadeIn 2s forwards; animation-delay: 0.5s;
        }
        @keyframes cinematicIntro {
            0% { transform: scale(0); opacity: 0; filter: drop-shadow(0 0 0px rgba(255, 215, 0, 0)); }
            50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 50px rgba(255, 215, 0, 1)); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8)); }
        }
        @keyframes textFadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .fade-out-overlay { animation: overlayFadeOut 0.5s forwards !important; }
        @keyframes overlayFadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

    </style>
</head>
<body>

    <!-- GLOBAL FIXED HEADER -->
    <div class="app-header" id="main-header">
        <img src="https://ik.imagekit.io/Rajmalik99/Picsart_26-03-04_21-46-15-352.png" alt="Title Image" class="header-title-img" draggable="false" onclick="window.location.href='index.html';">
        <button class="header-action-btn" onclick="location.hash='search'" id="header-toggle-btn">
            <span class="header-action-text">Search</span>
            <i class="fas fa-search"></i>
        </button>
    </div>

    <!-- HOME VIEW -->
    <div id="home-view">
        <img src="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110" alt="Website Logo" class="main-logo" draggable="false">
        
        <div id="error-message" class="error" style="display: none;"></div>

        <!-- SKELETON LOADER -->
        <div id="skeleton-container">
            <div class="skeleton-card"><div class="skeleton-photo"></div><div class="skeleton-info"><div class="skeleton-line w-70"></div><div class="skeleton-line w-40"></div><div class="skeleton-badges"><div class="skeleton-badge"></div><div class="skeleton-badge"></div></div></div></div>
            <div class="skeleton-card"><div class="skeleton-photo"></div><div class="skeleton-info"><div class="skeleton-line w-70"></div><div class="skeleton-line w-40"></div><div class="skeleton-badges"><div class="skeleton-badge"></div><div class="skeleton-badge"></div></div></div></div>
            <div class="skeleton-card"><div class="skeleton-photo"></div><div class="skeleton-info"><div class="skeleton-line w-70"></div><div class="skeleton-line w-40"></div><div class="skeleton-badges"><div class="skeleton-badge"></div><div class="skeleton-badge"></div></div></div></div>
            <div class="skeleton-card"><div class="skeleton-photo"></div><div class="skeleton-info"><div class="skeleton-line w-70"></div><div class="skeleton-line w-40"></div><div class="skeleton-badges"><div class="skeleton-badge"></div><div class="skeleton-badge"></div></div></div></div>
        </div>

        <div id="section-b" class="section-container" style="display: none;">
            <div class="section-title">Hall of Fame</div>
            <div class="filter-container">
                <select id="sort-filter" class="sort-select">
                    <option value="desc">Most Wins</option>
                    <option value="asc">Minimum Wins</option>
                </select>
            </div>
            <div id="leaderboard-container" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <!-- SEARCH VIEW -->
    <div id="search-view">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon-inside"></i>
            <input type="text" id="live-uid-input" class="live-search-bar" placeholder="Enter UID (e.g., 279...)" autocomplete="off">
        </div>
        <div id="search-status" class="search-status">Start typing a UID...</div>
        <div class="section-container" style="margin-top: 0;">
            <div id="suggestions-container" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <!-- FULL PROFILE MODAL -->
    <div id="profile-modal">
        <div class="modal-header">
            <img src="https://ik.imagekit.io/Rajmalik99/Picsart_26-03-04_21-46-15-352.png" alt="Title Image" class="header-title-img" draggable="false" onclick="window.location.href='index.html';">
            <button class="header-action-btn" onclick="history.back()">
                <span class="header-action-text">Back</span>
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- ELITE INTRO OVERLAY -->
        <div id="elite-intro-overlay">
            <i class="fas fa-medal elite-medal-icon"></i>
            <div class="elite-intro-text">1st Place Champion</div>
        </div>

        <div class="modal-overlay">
            <div id="modal-inner-content" class="modal-content">
                <!-- Injected dynamically -->
            </div>
        </div>
    </div>

    <!-- LIGHTBOX MODAL -->
    <div id="lightbox-modal" onclick="history.back()">
        <i class="fas fa-times lightbox-close"></i>
        <img id="lightbox-img" src="" alt="Full Preview" draggable="false">
    </div>

    <script>
        /* --- SECURITY SCRIPT: Disable Inspect Element, Right Click, & Shortcuts --- */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123) event.preventDefault();
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) event.preventDefault();
            if (event.ctrlKey && event.keyCode === 85) event.preventDefault();
        });

        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwKxTpF_0GCXfKdYVHeYKrpymJWqwdOdfU4ycBdBs2FDUwkXVYlYeAakOg6oW9neWmn/exec';

        let globalPlayerData = [];
        let autoOpenTriggeredFor = "";
        let currentSort = 'desc'; 

        // ---------------------------------------------------------
        // HASH BASED ROUTING (Hardware Back Button Support)
        // ---------------------------------------------------------
        window.addEventListener('hashchange', handleRoute);

        function handleRoute() {
            const hash = window.location.hash;
            const home = document.getElementById('home-view');
            const search = document.getElementById('search-view');
            const profile = document.getElementById('profile-modal');
            const lightbox = document.getElementById('lightbox-modal');
            const mainHeaderBtn = document.getElementById('header-toggle-btn');

            if (hash === '#lightbox') {
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            } else if (hash.startsWith('#profile')) {
                lightbox.style.display = 'none';
                profile.style.display = 'block';
                search.style.display = 'none';
                home.style.display = 'none';
                document.body.style.overflow = 'hidden';
            } else if (hash === '#search') {
                lightbox.style.display = 'none';
                profile.style.display = 'none';
                search.style.display = 'flex';
                home.style.display = 'none';
                document.body.style.overflow = 'auto';
                
                mainHeaderBtn.innerHTML = '<span class="header-action-text">Home</span><i class="fas fa-home"></i>';
                mainHeaderBtn.onclick = () => location.hash = 'home';
                document.getElementById('live-uid-input').focus();
            } else { // Home Default
                lightbox.style.display = 'none';
                profile.style.display = 'none';
                search.style.display = 'none';
                home.style.display = 'flex';
                document.body.style.overflow = 'auto';

                mainHeaderBtn.innerHTML = '<span class="header-action-text">Search</span><i class="fas fa-search"></i>';
                mainHeaderBtn.onclick = () => location.hash = 'search';
                
                document.getElementById('live-uid-input').value = '';
                document.getElementById('suggestions-container').innerHTML = '';
                document.getElementById('search-status').innerText = 'Start typing a UID...';
                autoOpenTriggeredFor = "";
            }
        }
        handleRoute();

        // Flutter Deep Link logic
        function openDeepLink(url) {
            if(!url) return;
            window.location.href = url;
        }

        function copyText(text, el) {
            navigator.clipboard.writeText(text).then(() => {
                el.className = 'fas fa-check copy-btn'; el.style.color = '#00ff00';
                setTimeout(() => { el.className = 'fas fa-copy copy-btn'; el.style.color = ''; }, 2000);
            }).catch(err => console.error('Failed to copy', err));
        }

        // ---------------------------------------------------------
        // RELATIVE TIER LOGIC (Wins + Kills Rank)
        // ---------------------------------------------------------
        function getPlayerRankIndex(playerUid) { return globalPlayerData.findIndex(p => p.Uid.toString() === playerUid.toString()); }

        function getTierInfo(rankIndex) {
            if (rankIndex === 0) return { class: "tier-diamond", name: "ELITE", icon: "fa-gem", color: "#00ffff" };
            if (rankIndex === 1) return { class: "tier-gold", name: "GOLD", icon: "fa-crown", color: "#ffd700" };
            if (rankIndex === 2) return { class: "tier-silver", name: "SILVER", icon: "fa-shield-alt", color: "#c0c0c0" };
            return { class: "tier-bronze", name: "BRONZE", icon: "fa-medal", color: "#cd7f32" };
        }

        function showNextTier(el, rankIndex, currentWins, currentKills) {
            const originalText = el.getAttribute('data-original');
            if (el.innerText !== originalText) return; 

            let msg = "";
            if (rankIndex === 0) {
                msg = "Reigning Champion!";
            } else if (rankIndex > 0) {
                const guyAbove = globalPlayerData[rankIndex - 1];
                const aboveWins = parseInt(guyAbove.Win) || 0;
                const aboveKills = parseInt(guyAbove.Background) || 0; 

                if (currentWins < aboveWins) { msg = `Need ${aboveWins - currentWins} Wins to Rank Up`; } 
                else if (currentWins === aboveWins && currentKills <= aboveKills) { msg = `Need ${(aboveKills - currentKills) + 1} Kills to Rank Up`; } 
                else { msg = "Keep Playing!"; }
            } else { msg = "Keep Playing!"; }

            el.innerText = msg; el.style.color = "#00ffff"; el.style.borderColor = "#00ffff";
            setTimeout(() => { el.innerText = originalText; el.style.color = ""; el.style.borderColor = "rgba(255, 255, 255, 0.3)"; }, 3000);
        }

        document.getElementById('sort-filter').addEventListener('change', function() { currentSort = this.value; renderLeaderboard(); });

        // Live Search Handling
        document.getElementById('live-uid-input').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            const suggestionsContainer = document.getElementById('suggestions-container');
            const statusText = document.getElementById('search-status');

            if (!query) { suggestionsContainer.innerHTML = ''; statusText.innerText = 'Start typing a UID...'; autoOpenTriggeredFor = ""; return; }
            if (globalPlayerData.length === 0) { statusText.innerText = "Data still loading..."; return; }

            const matches = globalPlayerData.filter(p => p.Uid.toString().toLowerCase().startsWith(query));

            if (matches.length === 0) { suggestionsContainer.innerHTML = ''; statusText.innerText = 'No players found with that UID prefix.'; return; }

            statusText.innerText = `Found ${matches.length} player(s)`;
            suggestionsContainer.innerHTML = '';
            
            matches.forEach(player => {
                const wins = parseInt(player.Win) || 0;
                const kills = parseInt(player.Background) || 0; 
                const rankIndex = getPlayerRankIndex(player.Uid);
                const tierInfo = getTierInfo(rankIndex);
                
                const originalUid = player.Uid.toString();
                const matchedPart = originalUid.substring(0, query.length);
                const restPart = originalUid.substring(query.length);
                const highlightedUID = `<span style="color:#ffffff;">${matchedPart}</span>${restPart}`;

                suggestionsContainer.innerHTML += `
                    <div class="player-card ${tierInfo.class}" onclick="openModal('${player.Uid}')">
                        <div class="player-card-photo-wrapper"><img src="${player.Photo || 'https://via.placeholder.css/70'}" class="player-card-photo" draggable="false"></div>
                        <div class="player-card-info">
                            <div class="player-card-name">${player.GameName || 'Unknown'}</div>
                            <div class="player-card-uid">UID: ${highlightedUID}</div>
                            <div class="badge-container">
                                <div class="win-badge">WINS: ${wins}</div>
                                <div class="kill-badge">KILLS: ${kills}</div>
                            </div>
                        </div>
                        <div class="mini-tier-icon" style="color: ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                    </div>
                `;
            });

            if (matches.length === 1 && matches[0].Uid.toString().toLowerCase() === query) {
                if (autoOpenTriggeredFor !== query) {
                    autoOpenTriggeredFor = query; 
                    setTimeout(() => openModal(matches[0].Uid), 300);
                }
            } else { autoOpenTriggeredFor = ""; }
        });

        // Helper to preload an image returning a Promise
        const preloadImage = (src) => {
            return new Promise((resolve) => {
                if (!src) return resolve();
                const img = new Image();
                img.onload = () => resolve();
                img.onerror = () => resolve(); // Resolve even if error to prevent hang
                img.src = src;
            });
        };

        // Initialize App, Fetch Data, and strictly manage Skeleton Loading
        document.addEventListener("DOMContentLoaded", () => {
            const errorMsg = document.getElementById('error-message');
            const skeletonContainer = document.getElementById('skeleton-container');
            const sectionB = document.getElementById('section-b');

            fetch(scriptUrl).then(res => res.json()).then(data => {
                if(data.error) { 
                    skeletonContainer.style.display = 'none';
                    errorMsg.style.display = 'block'; errorMsg.innerText = "Error: " + data.error; 
                    return; 
                }
                if(data.length === 0) { 
                    skeletonContainer.style.display = 'none';
                    errorMsg.style.display = 'block'; errorMsg.innerText = "Database is empty."; 
                    return; 
                }
                
                // PRE-SORT GLOBAL DATA (Wins Desc, then Kills Desc)
                globalPlayerData = data.sort((a, b) => {
                    const winA = parseInt(a.Win) || 0; const winB = parseInt(b.Win) || 0;
                    if (winA !== winB) return winB - winA; 
                    const killA = parseInt(a.Background) || 0; const killB = parseInt(b.Background) || 0;
                    return killB - killA; 
                });

                // INTELLIGENT PRELOADER
                // We gather essential structural images + top 5 player photos.
                const imagesToPreload = [
                    'https://ik.imagekit.io/Rajmalik99/Picsart_26-03-04_21-46-15-352.png',
                    'https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110'
                ];
                
                for(let i=0; i < Math.min(5, globalPlayerData.length); i++) {
                    if(globalPlayerData[i].Photo) imagesToPreload.push(globalPlayerData[i].Photo);
                }

                // Wait for all critical images to cache
                Promise.all(imagesToPreload.map(src => preloadImage(src))).then(() => {
                    // Hide skeleton and reveal UI ONLY when images are fully ready
                    skeletonContainer.style.display = 'none';
                    renderLeaderboard();
                });

            }).catch(err => {
                skeletonContainer.style.display = 'none';
                errorMsg.style.display = 'block'; errorMsg.innerText = "Failed to connect to server.";
                console.error(err);
            });
        });

        function renderLeaderboard() {
            let sortedData = [...globalPlayerData]; 
            if (currentSort === 'asc') sortedData.reverse();

            const container = document.getElementById('leaderboard-container');
            document.getElementById('section-b').style.display = 'flex';
            container.innerHTML = '';

            sortedData.forEach(player => {
                const wins = parseInt(player.Win) || 0;
                const kills = parseInt(player.Background) || 0; 
                const rankIndex = getPlayerRankIndex(player.Uid);
                const tierInfo = getTierInfo(rankIndex);

                container.innerHTML += `
                    <div class="player-card ${tierInfo.class}" onclick="openModal('${player.Uid}')">
                        <div class="player-card-photo-wrapper"><img src="${player.Photo || 'https://via.placeholder.css/70'}" class="player-card-photo" draggable="false"></div>
                        <div class="player-card-info">
                            <div class="player-card-name">${player.GameName || 'Unknown'}</div>
                            <div class="player-card-uid">UID: ${player.Uid}</div>
                            <div class="badge-container">
                                <div class="win-badge">WINS: ${wins}</div>
                                <div class="kill-badge">KILLS: ${kills}</div>
                            </div>
                        </div>
                        <div class="mini-tier-icon" style="color: ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                    </div>
                `;
            });
        }

        window.openLightbox = function(src) {
            document.getElementById('lightbox-img').src = src;
            window.location.hash = 'lightbox';
        };

        function openModal(uid) {
            const player = globalPlayerData.find(p => p.Uid.toString() === uid.toString());
            if(!player) return;

            window.location.hash = `profile-${uid}`;

            const modal = document.getElementById('profile-modal');
            const innerContent = document.getElementById('modal-inner-content');
            const introOverlay = document.getElementById('elite-intro-overlay');
            
            // Background uses Player Photo
            if (player.Photo && player.Photo.trim() !== '') {
                modal.style.backgroundImage = `url('${player.Photo}')`;
            } else {
                modal.style.backgroundImage = 'none';
                modal.style.backgroundColor = '#000';
            }

            const wins = parseInt(player.Win) || 0;
            const kills = parseInt(player.Background) || 0; 
            const rankIndex = getPlayerRankIndex(player.Uid);
            const tierInfo = getTierInfo(rankIndex);
            
            innerContent.className = `modal-content ${tierInfo.class}`;

            let galleryHTML = '';
            const pics = [player.AlbumPic1, player.AlbumPic2, player.AlbumPic3, player.AlbumPic4, player.AlbumPic5];
            pics.forEach(pic => {
                if(pic && pic.trim() !== "") { 
                    galleryHTML += `<img src="${pic}" class="gallery-img" draggable="false" style="border: 2px solid ${tierInfo.color};" onclick="openLightbox('${pic}')">`; 
                }
            });

            innerContent.innerHTML = `
                <div class="modal-tier-box" data-original="${tierInfo.name}" onclick="showNextTier(this, ${rankIndex}, ${wins}, ${kills})" style="color: ${tierInfo.color};">${tierInfo.name}</div>
                
                <div class="modal-photo-wrapper">
                    <img src="${player.Photo || 'https://via.placeholder.css/150'}" alt="Photo" class="modal-photo" draggable="false">
                    <div class="tier-icon-badge" style="color: ${tierInfo.color}; border: 1px solid ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                </div>
                
                <div class="name-copy-container">
                    <div class="modal-name">${player.GameName || 'Unknown'}</div>
                    <i class="fas fa-copy copy-btn" title="Copy Name" onclick="copyText('${player.GameName || ''}', this)"></i>
                </div>
                
                <div class="uid-copy-container">
                    <span>UID: ${player.Uid}</span>
                    <i class="fas fa-copy copy-btn" title="Copy UID" onclick="copyText('${player.Uid}', this)"></i>
                </div>
                
                ${player.Talent ? `<div class="modal-talent">${player.Talent}</div>` : ''}
                
                <div class="detail-badges-container">
                    <div class="detail-win-badge">WINS: ${wins}</div>
                    <div class="detail-kill-badge">KILLS: ${kills}</div>
                </div>

                ${player.InstagramReel ? `<div class="modal-huge-reel-btn" onclick="openDeepLink('${player.InstagramReel}')"><i class="fab fa-instagram"></i> WATCH WINNING REEL</div>` : ''}

                ${player.Bio ? `<div class="modal-bio">"${player.Bio}"</div>` : ''}

                <div class="social-container">
                    ${player.HisInstagram ? `<div class="social-icon insta" onclick="openDeepLink('${player.HisInstagram}')"><i class="fab fa-instagram"></i></div>` : ''}
                    ${player.HisYoutube ? `<div class="social-icon yt" onclick="openDeepLink('${player.HisYoutube}')"><i class="fab fa-youtube"></i></div>` : ''}
                    ${player.HisGmail ? `<div class="social-icon mail" onclick="openDeepLink('mailto:${player.HisGmail}')"><i class="fas fa-envelope"></i></div>` : ''}
                </div>

                ${galleryHTML ? `<div class="gallery-container">${galleryHTML}</div>` : ''}
            `;

            if (rankIndex === 0) {
                introOverlay.classList.remove('fade-out-overlay');
                introOverlay.style.display = 'flex';
                setTimeout(() => {
                    introOverlay.classList.add('fade-out-overlay');
                    setTimeout(() => { introOverlay.style.display = 'none'; }, 500);
                }, 2500);
            } else {
                introOverlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
