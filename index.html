                        <div class="win-badge" style="margin-bottom: 8px; font-size: 16px;">TOTAL WINS: ${wins}</div>
                        ${nextTierHTML}

                        ${player.Bio ? `<div class="modal-bio">"${player.Bio}"</div>` : ''}

                        <div class="social-container">
                            ${player.HisInstagram ? `<div class="social-icon insta" onclick="openLink('${player.HisInstagram}', false)"><i class="fab fa-instagram"></i></div>` : ''}
                            ${player.HisYoutube ? `<div class="social-icon yt" onclick="openLink('${player.HisYoutube}', false)"><i class="fab fa-youtube"></i></div>` : ''}
                            ${player.HisGmail ? `<div class="social-icon mail" onclick="openLink('${player.HisGmail}', true)"><i class="fas fa-envelope"></i></div>` : ''}
                        </div>

                        ${galleryHTML ? `<div class="gallery-container">${galleryHTML}</div>` : ''}
                    `;

                    modal.style.display = 'block';
                    document.body.style.overflow = 'hidden'; 
                };

                window.closeModal = function() {
                    document.getElementById('profile-modal').style.display = 'none';
                    document.body.style.overflow = 'auto'; 
                };

                window.openLightbox = function(index) {
                    window.currentLightboxIndex = index;
                    document.getElementById('lightbox-img-element').src = window.currentGalleryImages[window.currentLightboxIndex];
                    document.getElementById('lightbox-modal').style.display = 'flex';
                };

                window.closeLightbox = function() {
                    document.getElementById('lightbox-modal').style.display = 'none';
                };

                window.navigateLightbox = function(direction) {
                    window.currentLightboxIndex += direction;
                    if (window.currentLightboxIndex < 0) {
                        window.currentLightboxIndex = window.currentGalleryImages.length - 1;
                    } else if (window.currentLightboxIndex >= window.currentGalleryImages.length) {
                        window.currentLightboxIndex = 0;
                    }
                    document.getElementById('lightbox-img-element').src = window.currentGalleryImages[window.currentLightboxIndex];
                };

                window.onclick = function(event) {
                    const modalOverlay = document.querySelector('.modal-overlay');
                    const lightboxModal = document.getElementById('lightbox-modal');
                    if (event.target === modalOverlay) {
                        window.closeModal();
                    }
                    if (event.target === lightboxModal) {
                        window.closeLightbox();
                    }
                };

                // Fetch Data on Load
                const statusMsg = document.getElementById('status-message');
                fetch(scriptUrl)
                    .then(res => res.json())
                    .then(data => {
                        if(data.error) {
                            statusMsg.innerText = "Error: " + data.error;
                            statusMsg.classList.add('error');
                            return;
                        }
                        if(data.length === 0) {
                            statusMsg.innerText = "Database is empty.";
                            statusMsg.classList.add('error');
                            return;
                        }
                        
                        statusMsg.style.display = 'none';
                        window.globalPlayerData = data;
                        window.renderLeaderboard();
                    })
                    .catch(err => {
                        statusMsg.innerText = "Failed to connect to server.";
                        statusMsg.classList.add('error');
                        console.error(err);
                    });
            }
        })();
    </script>
</body>
</html>
