<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- META TAGS FOR LINK PREVIEWS -->
    <title>Dragon Tournaments | Hall of Fame</title>
    <meta name="description" content="Check out the top Elite players and Content Creators in the Dragon Tournaments Hall of Fame!">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dragon Tournaments | Hall of Fame">
    <meta property="og:description" content="Check out the top Elite players and Content Creators in the Dragon Tournaments Hall of Fame!">
    <meta property="og:image" content="https://ik.imagekit.io/5lz94dan6e/Picsart_26-02-26_14-18-51-931.png?updatedAt=1772095781110">

    <!-- EXTERNAL LIBRARIES & CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <!-- MILITARY GRADE ANTI-INSPECT ELEMENT -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123) event.preventDefault(); // Block F12
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) event.preventDefault(); // Block Ctrl+Shift+I/J/C
            if (event.ctrlKey && event.keyCode === 85) event.preventDefault(); // Block Ctrl+U
        });
        
        // Anti-Debugger Crasher Loop
        setInterval(function() {
            let before = new Date().getTime();
            debugger;
            let after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20vh;'>Security Violation. Access Denied.</h1>";
                window.location.replace("about:blank");
            }
        }, 50);
    </script>
</head>
<body>
    <!-- THE DOM IS EMPTY. IT WILL BE INJECTED SECURELY BY APP.JS -->
    <div id="secure-root"></div>

    <!-- LOAD THE LOGIC & ENCRYPTED HTML -->
    <script src="app.js"></script>
</body>
</html>
