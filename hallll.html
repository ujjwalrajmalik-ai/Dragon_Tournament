<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Tournaments | Hall of Fame</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Base & Resets + Security CSS + Advanced Symbol Font Stack */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none; -khtml-user-select: none;
            -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* STRICT ANTI-HORIZONTAL SCROLL */
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }

        /* Dynamic Cyber Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(5, 5, 5, 0.9); }
        ::-webkit-scrollbar-thumb { background: #66fcf1; border-radius: 10px; box-shadow: 0 0 10px rgba(102, 252, 241, 0.5); }
        
        body.scroll-elite ::-webkit-scrollbar-thumb { background: #66fcf1; box-shadow: 0 0 10px #66fcf1; }
        body.scroll-gold ::-webkit-scrollbar-thumb { background: #ffd700; box-shadow: 0 0 10px #ffd700; }
        body.scroll-silver ::-webkit-scrollbar-thumb { background: #c0c0c0; box-shadow: 0 0 10px #c0c0c0; }
        body.scroll-bronze ::-webkit-scrollbar-thumb { background: #cd7f32; box-shadow: 0 0 10px #cd7f32; }

        img { -webkit-touch-callout: none; -webkit-user-drag: none; }
        input { -webkit-user-select: text; -khtml-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }

        /* PURE BLACK BACKGROUND */
        body {
            background-color: #000000; color: #ffffff;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; 
            padding-top: 70px;
            padding-bottom: 50px;
        }

        /* Global Fixed App Header */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; 
            height: 70px; padding: 0 20px;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex;
            justify-content: space-between; align-items: center; 
            z-index: 900; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        .header-title-img { height: 40px; width: auto; border-radius: 5px; cursor: pointer; }

        .header-action-btn {
            color: #c5c6c7; font-size: 22px; cursor: pointer; transition: color 0.3s ease, transform 0.2s ease;
            display: flex; align-items: center; gap: 8px; background: none; border: none; outline: none;
        }
        
        .header-action-btn:hover { color: #66fcf1; transform: scale(1.05); }
        .header-action-text { font-size: 14px; font-weight: bold; text-transform: uppercase; display: none; }
        @media(min-width: 400px) { .header-action-text { display: block; } }

        #home-view { width: 100%; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.4s ease; }
        .main-logo { width: 120px; height: auto; margin-top: 20px; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }

        #skeleton-container { width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .skeleton-card { display: flex; align-items: center; background: rgba(20, 20, 20, 0.8); border-radius: 12px; padding: 15px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .skeleton-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transform: skewX(-20deg); animation: shimmer 1.5s infinite; }
        .skeleton-photo { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.05); margin-right: 15px; flex-shrink: 0; }
        .skeleton-info { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .skeleton-line { height: 14px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .skeleton-line.w-70 { width: 70%; }
        .skeleton-line.w-40 { width: 40%; }
        .skeleton-badges { display: flex; gap: 10px; margin-top: 5px; }
        .skeleton-badge { width: 60px; height: 22px; background: rgba(255,255,255,0.05); border-radius: 5px; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 200%; } }

        #search-view { display: none; width: 100%; min-height: calc(100vh - 70px); background-color: #000000; flex-direction: column; align-items: center; padding-top: 30px; animation: fadeIn 0.3s ease; }
        .search-input-wrapper { width: 90%; max-width: 500px; position: relative; margin-bottom: 30px; }
        .live-search-bar { width: 100%; padding: 18px 25px 18px 50px; font-size: 16px; color: #fff; background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(102, 252, 241, 0.2); border-radius: 12px; outline: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); transition: all 0.3s ease; }
        .live-search-bar:focus { border-color: #66fcf1; background: rgba(20, 20, 20, 1); }
        .search-icon-inside { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #66fcf1; font-size: 18px; }
        .search-status { color: #888; font-size: 14px; margin-bottom: 20px; height: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .error { color: #ff4c4c !important; text-align: center; font-weight: 500; margin-bottom: 20px;}

        .section-container { width: 90%; max-width: 600px; margin-bottom: 40px; display: flex; flex-direction: column; gap: 15px; }
        .section-title { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; color: #c5c6c7; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 8px; text-align: center; }

        .pill-filters-container { display: flex; gap: 10px; width: 100%; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .pill-filters-container::-webkit-scrollbar { display: none; }
        .filter-pill { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: #888; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 5px; }
        .filter-pill.active { background: rgba(102, 252, 241, 0.1); border-color: #66fcf1; color: #fff; box-shadow: 0 0 10px rgba(102, 252, 241, 0.2); }
        .filter-pill:hover { border-color: #c5c6c7; color: #fff; }

        .filter-container { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 5px; }
        .custom-select-wrapper { position: relative; user-select: none; width: 220px; z-index: 50; }
        .custom-select-trigger { background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(5,5,5,0.9)); color: #66fcf1; border: 1px solid rgba(102, 252, 241, 0.3); padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        .custom-select-trigger:hover { border-color: #66fcf1; box-shadow: 0 4px 20px rgba(102, 252, 241, 0.2); }
        .custom-select-icon { transition: transform 0.3s ease; }
        .custom-select-wrapper.open .custom-select-icon { transform: rotate(180deg); color: #fff; }
        
        .custom-select-options { position: absolute; top: calc(100% + 10px); right: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(102, 252, 241, 0.3); border-radius: 12px; width: 100%; overflow: hidden; opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.3s ease; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .custom-select-wrapper.open .custom-select-options { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .custom-option { padding: 14px 18px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .custom-option:hover { background: rgba(102, 252, 241, 0.15); color: #66fcf1; }
        .custom-option.selected { color: #66fcf1; background: rgba(102, 252, 241, 0.05); border-left: 3px solid #66fcf1; }

        .player-card { display: flex; align-items: center; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px); padding: 16px; cursor: pointer; position: relative; text-decoration: none; color: #fff; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; will-change: transform; overflow: visible; }
        .player-card-photo-wrapper { position: relative; width: 65px; height: 65px; margin-right: 18px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; border-radius: 50%; background: #000; }
        .player-card-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 2; border: 2px solid transparent; }
        
        .player-card-info { display: flex; flex-direction: column; flex-grow: 1; justify-content: center; pointer-events: none; overflow: hidden; }
        .player-card-name { font-size: 17px; font-weight: 700; text-transform: none; letter-spacing: 0.5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
        .player-card-uid { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; letter-spacing: 1px; }

        .badge-container { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .win-badge, .kill-badge { background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.05); pointer-events: none;}
        .kill-badge { border: 1px solid rgba(255, 76, 76, 0.2); color: #ff4c4c; background: rgba(255, 76, 76, 0.05); }
        .mini-tier-icon { margin-left: auto; font-size: 20px; padding-left: 10px; display: flex; align-items: center; justify-content: center; opacity: 0.9; pointer-events: none;}

        .card-rank-badge { position: absolute; top: -10px; left: -10px; width: 32px; height: 32px; background: #000000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; z-index: 10; font-style: italic; }

        .tier-bronze { border-color: rgba(205, 127, 50, 0.4); background: rgba(20, 20, 20, 0.6); }
        .tier-bronze .player-card-photo { border-color: rgba(205, 127, 50, 0.3); }
        .tier-bronze .card-rank-badge { color: #cd7f32; border: 2px solid #cd7f32; box-shadow: 0 0 10px rgba(205,127,50,0.5); }

        .tier-silver { border-color: rgba(192, 192, 192, 0.4); background: linear-gradient(145deg, rgba(30, 30, 30, 0.8) 0%, rgba(15, 15, 15, 0.8) 100%); }
        .tier-silver .player-card-name { color: #f5f5f5; }
        .tier-silver .player-card-photo { border-color: #c0c0c0; }
        .tier-silver .card-rank-badge { color: #c0c0c0; border: 2px solid #c0c0c0; box-shadow: 0 0 10px rgba(192,192,192,0.5); }

        .tier-gold { border-color: rgba(255, 215, 0, 0.4); background: linear-gradient(145deg, rgba(40, 35, 10, 0.6) 0%, rgba(10, 10, 10, 0.8) 100%); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.05); }
        .tier-gold .player-card-name { color: #ffd700; }
        .tier-gold .player-card-photo { border-color: #ffd700; }
        .tier-gold .card-rank-badge { color: #ffd700; border: 2px solid #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.5); }

        .tier-diamond { border-color: rgba(102, 252, 241, 0.5); background: linear-gradient(145deg, rgba(10, 30, 35, 0.7) 0%, rgba(5, 10, 15, 0.9) 100%); box-shadow: 0 8px 25px rgba(102, 252, 241, 0.08); overflow: visible; } 
        .tier-diamond::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(102, 252, 241, 0.1), transparent); transform: skewX(-20deg); transition: 0.5s; pointer-events: none; border-radius: 12px; }
        .tier-diamond:hover::after { left: 200%; transition: 0.8s ease-in-out; }
        .tier-diamond .player-card-name { color: #66fcf1; }
        .tier-diamond .player-card-photo { border-color: #66fcf1; }
        .tier-diamond .card-rank-badge { color: #66fcf1; border: 2px solid #66fcf1; box-shadow: 0 0 15px rgba(102,252,241,0.6); }

        .loading-spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #66fcf1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Full Profile Modal */
        #profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100%; z-index: 1000; background-color: #000000; background-size: cover; background-position: center; background-attachment: fixed; overflow-y: auto; overflow-x: hidden; padding-top: 70px; }
        .modal-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; padding: 0 20px; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .modal-overlay { position: relative; width: 100%; min-height: calc(100% - 70px); background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-x: hidden; box-sizing: border-box; }
        .modal-content { width: 100%; max-width: 600px; padding: 40px 30px; display: flex; flex-direction: column; align-items: center; position: relative; border-radius: 16px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.8); box-sizing: border-box; overflow-x: hidden; }

        .modal-share-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; z-index: 10; }
        .modal-share-btn:hover { background: rgba(102, 252, 241, 0.2); border-color: #66fcf1; color: #66fcf1; }

        .modal-tier-box { position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; z-index: 10; transition: all 0.3s ease; text-align: center; min-width: 80px; }
        .modal-photo-wrapper { width: 140px; height: 140px; margin-bottom: 25px; position: relative; display: flex; justify-content: center; align-items: center; border-radius: 50%; padding: 4px; }
        .modal-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; z-index: 2; background: #000; cursor: pointer; transition: transform 0.2s ease; }
        .modal-photo:hover { transform: scale(1.05); }
        .tier-icon-badge { position: absolute; bottom: -5px; right: -5px; background: #000; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 20px; border: 3px solid #000; pointer-events: none;}

        /* PREMIUM VIP ANIMATIONS */
        .premium-glow { position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #00ffff); background-size: 300% 300%; border-radius: 50%; z-index: 1; animation: premiumGlow 3s ease infinite; filter: blur(8px); }
        @keyframes premiumGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .premium-badge { background: linear-gradient(135deg, #ff00ff, #00ffff); color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-top: -10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255, 0, 255, 0.4); display: flex; align-items: center; justify-content: center; gap: 6px; animation: pulseBadge 2s infinite; z-index: 3; }
        @keyframes pulseBadge { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0, 255, 255, 0.6); } 100% { transform: scale(1); } }

        .tier-bronze.modal-content .modal-photo-wrapper { background: linear-gradient(135deg, #cd7f32 0%, #8b5a2b 100%); }
        .tier-silver.modal-content .modal-photo-wrapper { background: linear-gradient(135deg, #e0e0e0 0%, #808080 100%); }
        .tier-gold.modal-content .modal-photo-wrapper { background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15); }
        .tier-diamond.modal-content .modal-photo-wrapper { background: linear-gradient(135deg, #66fcf1 0%, #45a29e 100%); box-shadow: 0 10px 40px rgba(102, 252, 241, 0.2); }

        .name-copy-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .modal-name { font-size: 28px; font-weight: 800; text-transform: none; text-align: center; letter-spacing: 1px; color: #fff; line-height: 1.4; word-break: break-word; }
        .uid-copy-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; margin-bottom: 25px; color: #a0a0a0; font-size: 13px; font-weight: 500; background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 20px; }
        .copy-btn { cursor: pointer; transition: color 0.2s; font-size: 15px; color: #888; }
        .copy-btn:hover { color: #fff; }
        
        .modal-squadrole { background: rgba(102, 252, 241, 0.1); border: 1px solid rgba(102, 252, 241, 0.3); color: #66fcf1; padding: 6px 18px; border-radius: 6px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: center; gap: 8px;}

        .detail-badges-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .detail-win-badge, .detail-kill-badge { padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
        .detail-win-badge { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; }
        .detail-kill-badge { background: rgba(255, 76, 76, 0.05); border: 1px solid rgba(255, 76, 76, 0.2); color: #ff4c4c; }

        /* --- SLEEK CYBERPUNK VIDEO GRID --- */
        .video-grid { display: flex; flex-wrap: wrap; gap: 12px; width: 100%; justify-content: center; margin-bottom: 35px; }
        .cyber-video-btn {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px; color: #fff; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; 
            transition: all 0.2s ease; flex: 1; min-width: 110px; max-width: 160px; text-align: center;
        }
        .cyber-video-btn i { font-size: 24px; transition: transform 0.2s; }
        
        .cyber-video-btn.yt { border-color: rgba(255, 0, 0, 0.3); color: #ddd; }
        .cyber-video-btn.yt i { color: #ff0000; }
        .cyber-video-btn.yt:hover { border-color: #ff0000; background: rgba(255, 0, 0, 0.1); color: #fff; transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255,0,0,0.3); }
        .cyber-video-btn.yt:hover i { transform: scale(1.1); }
        
        .cyber-video-btn.ig { border-color: rgba(225, 48, 108, 0.3); color: #ddd; }
        .cyber-video-btn.ig i { color: #e1306c; }
        .cyber-video-btn.ig:hover { border-color: #e1306c; background: rgba(225, 48, 108, 0.1); color: #fff; transform: translateY(-3px); box-shadow: 0 5px 20px rgba(225,48,108,0.3); }
        .cyber-video-btn.ig:hover i { transform: scale(1.1); }

        .modal-bio { text-align: center; font-size: 14px; color: #b0b0b0; margin-bottom: 35px; line-height: 1.7; font-style: italic; max-width: 90%; }
        .social-container { display: flex; gap: 25px; margin-bottom: 35px; }
        .social-icon { color: #888; font-size: 26px; cursor: pointer; transition: transform 0.2s, color 0.2s; }
        .social-icon:hover { transform: translateY(-3px); }
        .social-icon.insta:hover { color: #e1306c; }
        .social-icon.yt:hover { color: #ff0000; }
        .social-icon.mail:hover { color: #ea4335; }

        .gallery-container { width: 100%; column-count: 2; column-gap: 15px; }
        .gallery-img { width: 100%; margin-bottom: 15px; border-radius: 8px; break-inside: avoid; cursor: pointer; transition: transform 0.2s; opacity: 0.9; }
        .gallery-img:hover { transform: scale(1.02); opacity: 1; }
        @media (max-width: 500px) { .gallery-container { column-count: 1; } }

        /* ADVANCED ALBUM LIGHTBOX (ZOOMABLE + DOWNLOAD) */
        #lightbox-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100%; background: rgba(5, 5, 5, 0.98); z-index: 2000; flex-direction: column; overflow: hidden;}
        .lightbox-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; width: 100%; z-index: 2010; position: absolute; top: 0; left: 0; pointer-events: none; }
        .lightbox-top-bar > * { pointer-events: auto; }
        .lightbox-close-new { color: #fff; font-size: 28px; cursor: pointer; opacity: 0.8; transition: 0.2s; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 50%; }
        .lightbox-close-new:hover { opacity: 1; }
        .lightbox-download-btn { background: #66fcf1; color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; box-shadow: 0 4px 15px rgba(102, 252, 241, 0.4); transition: 0.2s; }

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123) event.preventDefault();
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74 || event.keyCode === 67)) event.preventDefault();
            if (event.ctrlKey && event.keyCode === 85) event.preventDefault();
        });

 
        let globalPlayerData = []; let filteredData = []; let autoOpenTriggeredFor = "";
        let currentSort = 'desc'; let currentFilter = 'All'; let currentPage = 1; const itemsPerPage = 10;

        window.addEventListener('hashchange', handleRoute);

        function handleRoute() {
            const hash = window.location.hash;
            const home = document.getElementById('home-view');
            const search = document.getElementById('search-view');
            const profile = document.getElementById('profile-modal');
            const lightbox = document.getElementById('lightbox-modal');
            const pfpLightbox = document.getElementById('pfp-lightbox');
            const mainHeaderBtn = document.getElementById('header-toggle-btn');

            if (hash === '#lightbox') {
                lightbox.style.display = 'flex'; pfpLightbox.style.display = 'none'; document.body.style.overflow = 'hidden';
            } else if (hash === '#pfp') {
                pfpLightbox.style.display = 'flex'; lightbox.style.display = 'none'; document.body.style.overflow = 'hidden';
            } else if (hash.startsWith('#profile')) {
                lightbox.style.display = 'none'; pfpLightbox.style.display = 'none'; profile.style.display = 'block'; search.style.display = 'none'; home.style.display = 'none'; document.body.style.overflow = 'hidden';
            } else if (hash === '#search') {
                document.body.className = ''; 
                lightbox.style.display = 'none'; pfpLightbox.style.display = 'none'; profile.style.display = 'none'; search.style.display = 'flex'; home.style.display = 'none'; document.body.style.overflow = 'auto';
                mainHeaderBtn.innerHTML = '<span class="header-action-text">Home</span><i class="fas fa-home"></i>';
                mainHeaderBtn.onclick = () => location.hash = 'home';
                document.getElementById('live-uid-input').focus();
            } else { 
                document.body.className = ''; 
                lightbox.style.display = 'none'; pfpLightbox.style.display = 'none'; profile.style.display = 'none'; search.style.display = 'none'; home.style.display = 'flex'; document.body.style.overflow = 'auto';
                mainHeaderBtn.innerHTML = '<span class="header-action-text">Search</span><i class="fas fa-search"></i>';
                mainHeaderBtn.onclick = () => location.hash = 'search';
                document.getElementById('live-uid-input').value = ''; document.getElementById('suggestions-container').innerHTML = ''; document.getElementById('search-status').innerText = 'Start typing a UID...';
                autoOpenTriggeredFor = "";
            }
        }
        handleRoute();

        /* --- Advanced Touch Zoom / Pan Controller for Album Lightbox --- */
        const zoomArea = document.getElementById('zoom-area');
        const lbImg = document.getElementById('lightbox-img');
        let lbScale = 1, lbPinchDist = 0;
        let lbIsPanning = false, lbStartX, lbStartY, lbPanX = 0, lbPanY = 0;
        let lbLastTap = 0;

        zoomArea.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                lbPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else if (e.touches.length === 1) {
                let currentTime = new Date().getTime();
                let tapLength = currentTime - lbLastTap;
                if (tapLength < 300 && tapLength > 0) {
                    lbScale = lbScale === 1 ? 2.5 : 1;
                    lbPanX = 0; lbPanY = 0;
                    updateLbTransform(); e.preventDefault();
                } else {
                    if (lbScale > 1) {
                        lbIsPanning = true;
                        lbStartX = e.touches[0].pageX - lbPanX;
                        lbStartY = e.touches[0].pageY - lbPanY;
                    }
                }
                lbLastTap = currentTime;
            }
        }, { passive: false });

        zoomArea.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                e.preventDefault();
                let newDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                let scaleDelta = newDist / lbPinchDist;
                lbScale = Math.min(Math.max(1, lbScale * scaleDelta), 5);
                lbPinchDist = newDist; updateLbTransform();
            } else if (lbIsPanning && e.touches.length === 1 && lbScale > 1) {
                e.preventDefault();
                lbPanX = e.touches[0].pageX - lbStartX;
                lbPanY = e.touches[0].pageY - lbStartY;
                updateLbTransform();
            }
        }, { passive: false });

        zoomArea.addEventListener('touchend', () => { lbIsPanning = false; });

        function updateLbTransform() { lbImg.style.transform = `translate(${lbPanX}px, ${lbPanY}px) scale(${lbScale})`; }

        window.openLightbox = function(src) { 
            lbScale = 1; lbPanX = 0; lbPanY = 0; updateLbTransform();
            document.getElementById('lightbox-img').src = src; 
            window.location.hash = 'lightbox'; 
        };

        window.openPfpLightbox = function(src) {
            document.getElementById('pfp-lightbox-img').src = src; 
            window.location.hash = 'pfp'; 
        };

        /* Direct Download Logic for Album Pics */
        async function downloadAlbumPic() {
            const img = document.getElementById('lightbox-img');
            const url = img.src;
            const btn = document.getElementById('lightbox-download-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.style.pointerEvents = 'none';
            try {
                const response = await fetch(url, { mode: 'cors' });
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl; link.download = 'Dragon_Tournament_Album.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (e) { window.open(url, '_blank'); }
            btn.innerHTML = originalHTML; btn.style.pointerEvents = 'auto';
        }

        /* NATIVE APP INTENT DEEP-LINKING FOR VIDEOS */
        function openDeepLinkApp(url, e) {
            if(!url) return;
            const rect = e.target.getBoundingClientRect();
            const x = (rect.left + (rect.width / 2)) / window.innerWidth;
            const y = (rect.top + (rect.height / 2)) / window.innerHeight;
            confetti({ particleCount: 50, spread: 60, origin: { x: x, y: y }, colors: ['#e1306c', '#c13584', '#ffd700', '#66fcf1'] });
            
            setTimeout(() => {
                let finalUrl = url;
                const isAndroid = /android/i.test(navigator.userAgent);
                
                // If the user is on an Android phone, force the intent scheme so the native app opens.
                if (isAndroid) {
                    if (url.includes('instagram.com')) {
                        finalUrl = url.replace(/https?:\/\//, 'intent://') + '#Intent;package=com.instagram.android;scheme=https;end;';
                    } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                        finalUrl = url.replace(/https?:\/\//, 'intent://') + '#Intent;package=com.google.android.youtube;scheme=https;end;';
                    }
                }
                
                // Using window.open allows iOS to trigger Universal Links, and Android will fire the Intent.
                window.open(finalUrl, '_blank');
            }, 400);
        }

        function openDeepLink(url) { if(url) window.location.href = url; }
        
        function copyText(text, el) {
            navigator.clipboard.writeText(text).then(() => {
                el.className = 'fas fa-check copy-btn'; el.style.color = '#66fcf1';
                setTimeout(() => { el.className = 'fas fa-copy copy-btn'; el.style.color = ''; }, 2000);
            }).catch(err => console.error('Failed to copy', err));
        }

        function getPlayerRankIndex(playerUid) { return globalPlayerData.findIndex(p => p.Uid.toString() === playerUid.toString()); }
        function getTierInfo(rankIndex) {
            if (rankIndex === 0) return { class: "tier-diamond", name: "ELITE", icon: "fa-gem", color: "#66fcf1" };
            if (rankIndex === 1) return { class: "tier-gold", name: "GOLD", icon: "fa-crown", color: "#ffd700" };
            if (rankIndex === 2) return { class: "tier-silver", name: "SILVER", icon: "fa-shield-alt", color: "#c0c0c0" };
            return { class: "tier-bronze", name: "BRONZE", icon: "fa-medal", color: "#cd7f32" };
        }

        function showNextTier(el, rankIndex, currentWins, currentKills) {
            const originalText = el.getAttribute('data-original');
            if (el.innerText !== originalText) return; 
            let msg = "";
            if (rankIndex === 0) { msg = "Reigning Champion!"; } 
            else if (rankIndex > 0) {
                const guyAbove = globalPlayerData[rankIndex - 1];
                const aboveWins = parseInt(guyAbove.Win) || 0; const aboveKills = parseInt(guyAbove.Kill) || 0; 
                if (currentWins < aboveWins) { msg = `Need ${aboveWins - currentWins} Wins to Rank Up`; } 
                else if (currentWins === aboveWins && currentKills <= aboveKills) { msg = `Need ${(aboveKills - currentKills) + 1} Kills to Rank Up`; } 
                else { msg = "Keep Playing!"; }
            } else { msg = "Keep Playing!"; }

            el.innerText = msg; el.style.color = "#66fcf1"; el.style.borderColor = "#66fcf1";
            setTimeout(() => { el.innerText = originalText; el.style.color = ""; el.style.borderColor = "rgba(255, 255, 255, 0.1)"; }, 3000);
        }

        function applyTiltEffect() {
            const cards = document.querySelectorAll('.player-card:not(.tilt-active)');
            cards.forEach(card => {
                card.classList.add('tilt-active');
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                    const centerX = rect.width / 2; const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -8; const rotateY = ((x - centerX) / centerX) * 8;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                });
                card.addEventListener('mouseleave', () => { card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`; });
            });
        }

        const sortWrapper = document.getElementById('custom-sort');
        const sortTrigger = sortWrapper.querySelector('.custom-select-trigger');
        const sortOptions = sortWrapper.querySelectorAll('.custom-option');
        const sortText = document.getElementById('custom-select-text');
        sortTrigger.addEventListener('click', () => { sortWrapper.classList.toggle('open'); });
        document.addEventListener('click', (e) => { if(!sortWrapper.contains(e.target)) sortWrapper.classList.remove('open'); });
        sortOptions.forEach(opt => {
            opt.addEventListener('click', function() {
                sortOptions.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected'); sortText.innerText = this.innerText; currentSort = this.getAttribute('data-value'); sortWrapper.classList.remove('open'); refreshList();
            });
        });
        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', function() {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                this.classList.add('active'); currentFilter = this.getAttribute('data-filter'); refreshList();
            });
        });

        function refreshList() { document.getElementById('leaderboard-container').innerHTML = ''; currentPage = 1; applyFiltersAndSort(); renderPage(); }

        function applyFiltersAndSort() {
            let temp = [];
            if(currentFilter === 'All') { temp = [...globalPlayerData]; } 
            else { temp = globalPlayerData.filter(p => { const r = getPlayerRankIndex(p.Uid); return getTierInfo(r).name === currentFilter; }); }
            if (currentSort === 'asc') temp.reverse(); filteredData = temp;
        }

        document.getElementById('live-uid-input').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            const suggestionsContainer = document.getElementById('suggestions-container'); const statusText = document.getElementById('search-status');
            if (!query) { suggestionsContainer.innerHTML = ''; statusText.innerText = 'Start typing a UID...'; autoOpenTriggeredFor = ""; return; }
            if (globalPlayerData.length === 0) { statusText.innerText = "Data still loading..."; return; }
            const matches = globalPlayerData.filter(p => p.Uid.toString().toLowerCase().startsWith(query));
            if (matches.length === 0) { suggestionsContainer.innerHTML = ''; statusText.innerText = 'No players found with that UID prefix.'; return; }

            statusText.innerText = `Found ${matches.length} player(s)`; suggestionsContainer.innerHTML = '';
            matches.forEach(player => {
                const wins = parseInt(player.Win) || 0; const kills = parseInt(player.Kill) || 0; 
                const rankIndex = getPlayerRankIndex(player.Uid); const tierInfo = getTierInfo(rankIndex);
                const originalUid = player.Uid.toString(); const matchedPart = originalUid.substring(0, query.length); const restPart = originalUid.substring(query.length);
                const highlightedUID = `<span style="color:#ffffff;">${matchedPart}</span>${restPart}`;
                suggestionsContainer.innerHTML += `
                    <div class="player-card ${tierInfo.class}" onclick="openModal('${player.Uid}')">
                        <div class="card-rank-badge">#${rankIndex + 1}</div>
                        <div class="player-card-photo-wrapper"><img src="${player.Photo || 'https://via.placeholder.css/70'}" class="player-card-photo" draggable="false"></div>
                        <div class="player-card-info">
                            <div class="player-card-name">${player.GameName || 'Unknown'}</div>
                            <div class="player-card-uid">UID: ${highlightedUID}</div>
                            <div class="badge-container"><div class="win-badge">WINS: ${wins}</div><div class="kill-badge">KILLS: ${kills}</div></div>
                        </div>
                        <div class="mini-tier-icon" style="color: ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                    </div>`;
            });
            applyTiltEffect();
            if (matches.length === 1 && matches[0].Uid.toString().toLowerCase() === query) {
                if (autoOpenTriggeredFor !== query) { autoOpenTriggeredFor = query; setTimeout(() => openModal(matches[0].Uid), 300); }
            } else { autoOpenTriggeredFor = ""; }
        });

        document.addEventListener("DOMContentLoaded", () => {
            const errorMsg = document.getElementById('error-message'); const skeletonContainer = document.getElementById('skeleton-container');
            fetch(scriptUrl).then(res => res.json()).then(data => {
                if(data.error) { skeletonContainer.style.display = 'none'; errorMsg.style.display = 'block'; errorMsg.innerText = "Error: " + data.error; return; }
                if(data.length === 0) { skeletonContainer.style.display = 'none'; errorMsg.style.display = 'block'; errorMsg.innerText = "Database is empty."; return; }
                
                globalPlayerData = data.sort((a, b) => {
                    const winA = parseInt(a.Win) || 0; const winB = parseInt(b.Win) || 0;
                    if (winA !== winB) return winB - winA; 
                    const killA = parseInt(a.Kill) || 0; const killB = parseInt(b.Kill) || 0; return killB - killA; 
                });
                filteredData = [...globalPlayerData];

                const spinner = document.getElementById('loading-spinner');
                const observer = new IntersectionObserver((entries) => {
                    if(entries[0].isIntersecting) {
                        if(currentPage * itemsPerPage < filteredData.length) {
                            spinner.style.display = 'block';
                            setTimeout(() => { currentPage++; renderPage(); spinner.style.display = 'none'; }, 400);
                        }
                    }
                }, { rootMargin: "100px" });
                observer.observe(document.getElementById('scroll-trigger'));

                skeletonContainer.style.display = 'none'; document.getElementById('section-b').style.display = 'flex'; renderPage();
            }).catch(err => { skeletonContainer.style.display = 'none'; errorMsg.style.display = 'block'; errorMsg.innerText = "Failed to connect to server."; });
        });

        function renderPage() {
            const container = document.getElementById('leaderboard-container'); const start = (currentPage - 1) * itemsPerPage; const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);
            pageData.forEach(player => {
                const wins = parseInt(player.Win) || 0; const kills = parseInt(player.Kill) || 0; 
                const rankIndex = getPlayerRankIndex(player.Uid); const tierInfo = getTierInfo(rankIndex);
                container.innerHTML += `
                    <div class="player-card ${tierInfo.class}" onclick="openModal('${player.Uid}')">
                        <div class="card-rank-badge">#${rankIndex + 1}</div>
                        <div class="player-card-photo-wrapper"><img src="${player.Photo || 'https://via.placeholder.css/70'}" class="player-card-photo" draggable="false" crossorigin="anonymous"></div>
                        <div class="player-card-info">
                            <div class="player-card-name">${player.GameName || 'Unknown'}</div>
                            <div class="player-card-uid">UID: ${player.Uid}</div>
                            <div class="badge-container"><div class="win-badge">WINS: ${wins}</div><div class="kill-badge">KILLS: ${kills}</div></div>
                        </div>
                        <div class="mini-tier-icon" style="color: ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                    </div>`;
            });
            applyTiltEffect();
        }

        async function downloadPostcard(uid) {
            const player = globalPlayerData.find(p => p.Uid.toString() === uid.toString()); if(!player) return;
            const rankIndex = getPlayerRankIndex(player.Uid); const tierInfo = getTierInfo(rankIndex);
            const wins = parseInt(player.Win) || 0; const kills = parseInt(player.Kill) || 0;
            const generator = document.getElementById('postcard-generator');
            const photoUrl = player.Photo || 'https://via.placeholder.css/1080';
            const brandLogoUrl = "https://ik.imagekit.io/5lz94dan6e/Picsart_26-03-30_08-28-40-573.png?updatedAt=1774839553114";

            generator.className = `tier-${tierInfo.name.toLowerCase()}`;
            generator.innerHTML = `
                <div class="pc-bg" style="background-image: url('${photoUrl}');"></div>
                <div class="pc-content">
                    <div class="pc-tier-title">${tierInfo.name} RANK #${rankIndex + 1}</div>
                    <div class="pc-dp-wrapper"><img class="pc-dp" src="${photoUrl}" crossorigin="anonymous"><div class="pc-icon"><i class="fas ${tierInfo.icon}"></i></div></div>
                    <div class="pc-name">${player.GameName || 'Unknown'}</div>
                    <div class="pc-uid">UID: ${player.Uid}</div>
                    <div class="pc-stats-container"><div class="pc-stat pc-win">WINS<span>${wins}</span></div><div class="pc-stat pc-kill">KILLS<span>${kills}</span></div></div>
                    <div class="pc-brand"><img src="${brandLogoUrl}" crossorigin="anonymous"></div>
                </div>`;

            const btn = document.querySelector('.modal-share-btn'); const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GENERATING...'; btn.style.pointerEvents = 'none';
            await Promise.all(Array.from(generator.querySelectorAll('img')).map(img => {
                if(img.complete) return Promise.resolve();
                return new Promise(resolve => { img.onload = img.onerror = resolve; });
            }));
            try {
                const canvas = await html2canvas(generator, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#000', width: 1080, height: 1080 });
                const link = document.createElement('a'); link.download = `${(player.GameName || 'Player').replace(/\s+/g, '_')}_Dragon_Rank.png`;
                link.href = canvas.toDataURL('image/png', 1.0); link.click();
            } catch (e) { console.error("Could not generate postcard", e); alert("Sorry, an error occurred while creating the postcard."); }
            btn.innerHTML = oldText; btn.style.pointerEvents = 'auto';
        }

        function openModal(uid) {
            const player = globalPlayerData.find(p => p.Uid.toString() === uid.toString()); if(!player) return;

            window.location.hash = `profile-${uid}`;
            const modal = document.getElementById('profile-modal'); const innerContent = document.getElementById('modal-inner-content'); const introOverlay = document.getElementById('elite-intro-overlay');
            
            if (player.Photo && player.Photo.trim() !== '') modal.style.backgroundImage = `url('${player.Photo}')`;
            else { modal.style.backgroundImage = 'none'; modal.style.backgroundColor = '#0b0c10'; }

            const wins = parseInt(player.Win) || 0; const kills = parseInt(player.Kill) || 0; 
            const rankIndex = getPlayerRankIndex(player.Uid); const tierInfo = getTierInfo(rankIndex);
            
            document.body.className = `scroll-${tierInfo.name.toLowerCase()}`; innerContent.className = `modal-content ${tierInfo.class}`;

            let galleryHTML = '';
            const pics = [player.AlbumPic1, player.AlbumPic2, player.AlbumPic3, player.AlbumPic4, player.AlbumPic5];
            pics.forEach(pic => { if(pic && pic.trim() !== "") galleryHTML += `<img src="${pic}" class="gallery-img" draggable="false" loading="lazy" style="border: 1px solid rgba(255,255,255,0.1);" onclick="openLightbox('${pic}')">`; });
            
            const isPremium = player.Subscription && player.Subscription.trim().toLowerCase() === 'premium';

            // DYNAMIC SLEEK VIDEO GRID (Only renders if link exists)
            let videoButtonsHTML = '';
            if (player.YoutubeVideo || player.InstaShort1 || player.InstaShort2) {
                videoButtonsHTML += `<div class="video-grid">`;
                if (player.YoutubeVideo) {
                    videoButtonsHTML += `<div class="cyber-video-btn yt" onclick="openDeepLinkApp('${player.YoutubeVideo}', event)">
                                            <i class="fab fa-youtube"></i><span>Tournament</span>
                                         </div>`;
                }
                if (player.InstaShort1) {
                    videoButtonsHTML += `<div class="cyber-video-btn ig" onclick="openDeepLinkApp('${player.InstaShort1}', event)">
                                            <i class="fab fa-instagram"></i><span>Funny Reel</span>
                                         </div>`;
                }
                if (player.InstaShort2) {
                    videoButtonsHTML += `<div class="cyber-video-btn ig" onclick="openDeepLinkApp('${player.InstaShort2}', event)">
                                            <i class="fab fa-instagram"></i><span>Commentary</span>
                                         </div>`;
                }
                videoButtonsHTML += `</div>`;
            }

            innerContent.innerHTML = `
                <button class="modal-share-btn" onclick="downloadPostcard('${player.Uid}')"><i class="fas fa-share-alt"></i> Share Card</button>
                <div class="modal-tier-box" data-original="${tierInfo.name}" onclick="showNextTier(this, ${rankIndex}, ${wins}, ${kills})" style="color: ${tierInfo.color};">${tierInfo.name}</div>
                
                <div class="modal-photo-wrapper">
                    ${isPremium ? `<div class="premium-glow"></div>` : ''}
                    <img src="${player.Photo || 'https://via.placeholder.css/150'}" alt="Photo" class="modal-photo" draggable="false" crossorigin="anonymous" onclick="openPfpLightbox('${player.Photo}')">
                    <div class="tier-icon-badge" style="color: ${tierInfo.color};"><i class="fas ${tierInfo.icon}"></i></div>
                </div>

                ${isPremium ? `<div class="premium-badge"><i class="fas fa-crown"></i> Premium Member</div>` : ''}
                
                <div class="name-copy-container">
                    <div class="modal-name">${player.GameName || 'Unknown'}</div>
                    <i class="fas fa-copy copy-btn" title="Copy Name" onclick="copyText('${player.GameName || ''}', this)"></i>
                </div>
                
                <div class="uid-copy-container">
                    <span>UID: ${player.Uid}</span>
                    <i class="fas fa-copy copy-btn" title="Copy UID" onclick="copyText('${player.Uid}', this)"></i>
                </div>
                
                ${player.SquadRole ? `<div class="modal-squadrole"><i class="fas fa-crosshairs"></i> ROLE: ${player.SquadRole}</div>` : ''}
                
                <div class="detail-badges-container">
                    <div class="detail-win-badge">WINS: ${wins}</div>
                    <div class="detail-kill-badge">KILLS: ${kills}</div>
                </div>

                ${videoButtonsHTML}

                ${player.Bio ? `<div class="modal-bio">"${player.Bio}"</div>` : ''}

                <div class="social-container">
                    ${player.HisInstagram ? `<div class="social-icon insta" onclick="openDeepLink('${player.HisInstagram}')"><i class="fab fa-instagram"></i></div>` : ''}
                    ${player.HisYoutube ? `<div class="social-icon yt" onclick="openDeepLink('${player.HisYoutube}')"><i class="fab fa-youtube"></i></div>` : ''}
                    ${player.HisGmail ? `<div class="social-icon mail" onclick="openDeepLink('mailto:${player.HisGmail}')"><i class="fas fa-envelope"></i></div>` : ''}
                </div>
                
                ${galleryHTML ? `<div class="gallery-container">${galleryHTML}</div>` : ''}
            `;

            if (rankIndex === 0) {
                introOverlay.classList.remove('fade-out-overlay'); introOverlay.style.display = 'flex';
                setTimeout(() => { introOverlay.classList.add('fade-out-overlay'); setTimeout(() => { introOverlay.style.display = 'none'; }, 500); }, 2500);
            } else { introOverlay.style.display = 'none'; }
        }
    </script>
</body>
<script src="auth.js"></script>
</body>
</html>
</html>
